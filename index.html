<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Despesas Cirurtec</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  font-family:'Inter',sans-serif;
  background:#f6f8fb;
  padding:15px;
  color:#2c3e50;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}
.header img{
  max-width:140px;
}
.header h1{
  font-size:20px;
  margin-top:8px;
}

/* CARD */
.card{
  background:#fff;
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:0 6px 16px rgba(0,0,0,0.06);
  border:1px solid #eef1f5;
}

/* INPUTS */
input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #e0e4ea;
  background:#fafbfc;
  font-size:14px;
  transition:0.2s;
}

input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:#1976d2;
  background:#fff;
  box-shadow:0 0 0 2px rgba(25,118,210,0.1);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-weight:500;
  cursor:pointer;
  transition:0.2s;
}

.btn-primary{
  background:#1976d2;
  color:#fff;
}

.btn-sec{
  background:#e3f2fd;
  color:#1976d2;
}

.btn-del{
  background:#fdecea;
  color:#c62828;
}

button:hover{
  transform:translateY(-1px);
  opacity:0.95;
}

/* TITLES */
h3{
  margin-bottom:5px;
  font-size:16px;
}

/* DESPESAS */
.despesa{
  background:#f9fafb;
  border-radius:12px;
  padding:10px;
  margin-top:10px;
  border:1px solid #eef1f5;
}

/* ANEXO */
.anexo{
  background:#f9fafb;
  border-radius:12px;
  padding:10px;
  margin-top:10px;
  border:1px solid #e0e0e0;
}
.anexo img{
  border-radius:10px;
}

/* HIDDEN */
.hidden{display:none;}

</style>
</head>

<body>

<div class="header">
  <img src="1000644584.png">
  <h1>Despesas Cirurtec</h1>
</div>

<datalist id="cidades-mg">
  <option value="Belo Horizonte - MG">
  <option value="Uberlândia - MG">
  <option value="Uberaba - MG">
  <option value="Juiz de Fora - MG">
  <option value="Divinópolis - MG">
</datalist>

<div class="card">
  <input id="nome" placeholder="Nome do técnico">
  <input id="email" placeholder="E-mail">
</div>

<div class="card">
  <label>Data início</label>
  <input type="datetime-local" id="dataInicio">

  <label>Data final</label>
  <input type="datetime-local" id="dataFim">

  <input type="number" id="adiantamento" placeholder="Adiantamento (R$)">
</div>

<div class="card">
  <h3>Trajeto</h3>
  <input list="cidades-mg" id="origem" placeholder="Origem">
  <button class="btn-sec" onclick="addParada()">+ Adicionar parada</button>
  <div id="paradas"></div>
  <input list="cidades-mg" id="destino" placeholder="Destino">
</div>

<div class="card">
  <h3>Nova despesa</h3>

  <select id="categoria" onchange="controleCategoria()">
    <option value="">Categoria</option>
    <option>Alimentação</option>
    <option>Bônus de viagem</option>
    <option>Veículo próprio</option>
    <option>Combustível</option>
    <option>Pedágios</option>
    <option>Peças</option>
    <option>Hospedagem</option>
    <option>Outros</option>
  </select>

  <select id="sub" class="hidden" onchange="calcularValor()">
    <option value="">Refeição</option>
    <option>Almoço</option>
    <option>Café da tarde</option>
    <option>Jantar</option>
  </select>

  <input type="number" id="qtd" class="hidden" min="1" placeholder="Quantidade" oninput="calcularValor()">
  <input id="outros" class="hidden" placeholder="Descrição">

  <input id="valor" type="number" placeholder="Valor (R$)" readonly>

  <button class="btn-primary" onclick="addDespesa()">Adicionar despesa</button>
</div>

<div class="card">
  <h3>Despesas</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>Anexos</h3>

  <button class="btn-sec" onclick="camera.click()">📸 Câmera</button>
  <input id="camera" type="file" accept="image/*" capture="environment" multiple hidden>

  <button class="btn-sec" onclick="galeria.click()">🖼️ Galeria</button>
  <input id="galeria" type="file" accept="image/*" multiple hidden>

  <div id="listaAnexos"></div>
</div>

<div class="card">
  <h3>Observações</h3>
  <textarea id="observacoes" maxlength="500"></textarea>
</div>

<div class="card">
  <button class="btn-primary" onclick="finalizar()">Finalizar e gerar PDF</button>
</div>

<script>

let despesas=[], anexos=[];

/* DATA */
function formatarDataHora(dt){
  if(!dt) return "";
  const [data, hora] = dt.split("T");
  const [y,m,d] = data.split("-");
  return `${d}/${m}/${y} ${hora}`;
}

/* PARADAS */
function addParada(){
  const d=document.createElement("div");
  d.innerHTML=`<input list="cidades-mg" placeholder="Cidade de parada">`;
  paradas.appendChild(d);
}

/* CATEGORIA */
function controleCategoria(){
  sub.classList.add("hidden");
  qtd.classList.add("hidden");
  outros.classList.add("hidden");
  valor.value="";
  valor.readOnly=true;

  if(categoria.value==="Alimentação"){
    sub.classList.remove("hidden");
    qtd.classList.remove("hidden");
  }

  if(["Bônus de viagem","Veículo próprio"].includes(categoria.value)){
    qtd.classList.remove("hidden");
    calcularValor();
  }

  if(categoria.value==="Outros"){
    outros.classList.remove("hidden");
    valor.readOnly=false;
  }

  if(["Combustível","Pedágios","Peças","Hospedagem"].includes(categoria.value)){
    valor.readOnly=false;
  }
}

/* CALCULAR */
function calcularValor(){
  const q=Number(qtd.value)||0;

  if(categoria.value==="Alimentação"){
    const t={Almoço:10,"Café da tarde":10,Jantar:40};
    if(t[sub.value]&&q) valor.value=t[sub.value]*q;
  }

  if(categoria.value==="Bônus de viagem"&&q) valor.value=25*q;

  if(categoria.value==="Veículo próprio"&&q) valor.value=(1.28*q).toFixed(2);
}

/* ADD DESPESA */
function addDespesa(){
  if(!categoria.value||!valor.value) return alert("Preencha os dados");

  despesas.push({
    categoria:categoria.value,
    detalhe:sub.value||outros.value||"",
    quantidade:Number(qtd.value)||1,
    valorTotal:Number(valor.value)
  });

  renderDespesas();

  categoria.value=sub.value=qtd.value=outros.value=valor.value="";
  controleCategoria();
}

/* RENDER */
function renderDespesas(){
  lista.innerHTML="";
  despesas.forEach((d,i)=>{
    lista.innerHTML+=`
      <div class="despesa">
        ${d.categoria} – R$ ${d.valorTotal.toFixed(2)}
        <button class="btn-sec" onclick="editarDespesa(${i})">Editar</button>
        <button class="btn-del" onclick="removerDespesa(${i})">Excluir</button>
      </div>`;
  });
}

/* REMOVER */
function removerDespesa(i){
  if(confirm("Excluir despesa?")){
    despesas.splice(i,1);
    renderDespesas();
  }
}

/* EDITAR */
function editarDespesa(i){
  const d=despesas[i];

  categoria.value=d.categoria;
  controleCategoria();

  if(d.detalhe) sub.value=d.detalhe;
  qtd.value=d.quantidade;
  valor.value=d.valorTotal;

  despesas.splice(i,1);
  renderDespesas();
}

/* ANEXOS */
function processarArquivos(input){
  [...input.files].forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      anexos.push({img:e.target.result,desc:""});
      renderAnexos();
    };
    r.readAsDataURL(f);
  });
}

camera.onchange=()=>processarArquivos(camera);
galeria.onchange=()=>processarArquivos(galeria);

function renderAnexos(){
  listaAnexos.innerHTML="";
  anexos.forEach((a,i)=>{
    listaAnexos.innerHTML+=`
      <div class="anexo">
        <img src="${a.img}" width="100%">
        <textarea placeholder="Descrição"
          oninput="anexos[${i}].desc=this.value"></textarea>
      </div>`;
  });
}

/* PDF COMPLETO */
function finalizar(){

  const ad = Number(adiantamento.value)||0;

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  let y=10,total=0;

  pdf.setFontSize(12);
  pdf.text("Cirurtec Hospitalar LTDA",10,y); y+=8;

  pdf.setFontSize(10);
  pdf.text(`Técnico: ${nome.value}`,10,y); y+=5;
  pdf.text(`E-mail: ${email.value}`,10,y); y+=5;
  pdf.text(`Data início: ${formatarDataHora(dataInicio.value)}`,10,y); y+=5;
  pdf.text(`Data final: ${formatarDataHora(dataFim.value)}`,10,y); y+=8;

  pdf.text("Trajeto",10,y); y+=5;
  pdf.text(`Origem: ${origem.value}`,10,y); y+=5;

  [...paradas.children].forEach((p,i)=>{
    const cidade=p.querySelector("input").value;
    if(cidade){
      pdf.text(`Parada ${i+1}: ${cidade}`,10,y);
      y+=5;
    }
  });

  pdf.text(`Destino: ${destino.value}`,10,y); y+=8;

  const porCategoria={};

  despesas.forEach(d=>{
    if(!porCategoria[d.categoria]) porCategoria[d.categoria]=[];
    porCategoria[d.categoria].push(d);
    total+=d.valorTotal;
  });

  pdf.text("Despesas",10,y); y+=6;

  for(const cat in porCategoria){
    pdf.setFont(undefined,"bold");
    pdf.text(cat,10,y); y+=5;

    pdf.setFont(undefined,"normal");

    porCategoria[cat].forEach(d=>{
      pdf.text(`${d.detalhe||"-"} | Qtd: ${d.quantidade} | R$ ${d.valorTotal.toFixed(2)}`,12,y);
      y+=5;

      if(y>270){
        pdf.addPage();
        y=10;
      }
    });

    y+=3;
  }

  pdf.text(`Adiantamento: R$ ${ad.toFixed(2)}`,10,y); y+=5;
  pdf.text(`Total gasto: R$ ${total.toFixed(2)}`,10,y); y+=5;

  const saldo=ad-total;

  pdf.text(`Saldo final: R$ ${saldo.toFixed(2)} ${saldo<0?"(NEGATIVO)":"(RESTANTE)"}`,10,y);

  if(observacoes.value){
    y+=8;
    pdf.text("Observações:",10,y); y+=5;
    pdf.text(observacoes.value,10,y,{maxWidth:190});
  }

  if(anexos.length){
    pdf.addPage(); y=10;

    anexos.forEach(a=>{
      if(y>220){
        pdf.addPage();
        y=10;
      }

      pdf.addImage(a.img,"JPEG",10,y,80,60);

      if(a.desc){
        pdf.text(a.desc,10,y+65);
      }

      y+=75;
    });
  }

  pdf.save("Despesas_Cirurtec.pdf");
}

</script>

</body>
</html>
