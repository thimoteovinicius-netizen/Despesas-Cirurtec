<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Despesas Cirurtec</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:'Inter',sans-serif;
  background:#f6f8fb;
  padding:15px;
}

.card{
  background:#fff;
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:0 6px 16px rgba(0,0,0,0.06);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #e0e4ea;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:14px;
}

.btn-primary{background:#1976d2;color:#fff;}
.btn-sec{background:#e3f2fd;color:#1976d2;}
.btn-del{background:#fdecea;color:#c62828;}

.despesa{
  background:#f9fafb;
  border-radius:12px;
  padding:10px;
  margin-top:10px;
}

.anexo{
  background:#f9fafb;
  border-radius:12px;
  padding:10px;
  margin-top:10px;
}
.anexo img{border-radius:10px;}

.hidden{display:none;}
</style>
</head>

<body>

<!-- CIDADES COMPLETAS MG -->
<datalist id="cidades-mg"></datalist>

<div class="card">
  <input id="nome" placeholder="Nome do técnico">
  <input id="email" placeholder="E-mail">
</div>

<div class="card">
  <input type="datetime-local" id="dataInicio">
  <input type="datetime-local" id="dataFim">
  <input type="number" id="adiantamento" placeholder="Adiantamento">
</div>

<div class="card">
  <h3>Trajeto</h3>

  <input list="cidades-mg" id="origem" placeholder="Origem">
  <button class="btn-sec" onclick="addParada()">+ Parada</button>
  <div id="paradas"></div>
  <input list="cidades-mg" id="destino" placeholder="Destino">
</div>

<div class="card">
  <h3>Nova despesa</h3>

  <select id="categoria" onchange="controleCategoria()">
    <option value="">Categoria</option>
    <option>Alimentação</option>
    <option>Bônus de viagem</option>
    <option>Veículo próprio</option>
    <option>Combustível</option>
    <option>Pedágios</option>
    <option>Peças</option>
    <option>Hospedagem</option>
    <option>Outros</option>
  </select>

  <select id="sub" class="hidden" onchange="calcularValor()">
    <option value="">Refeição</option>
    <option>Almoço</option>
    <option>Café da tarde</option>
    <option>Jantar</option>
  </select>

  <input id="qtd" class="hidden" type="number" min="1" oninput="calcularValor()">
  <input id="outros" class="hidden" placeholder="Descrição">
  <input id="valor" type="number" placeholder="Valor">

  <button class="btn-primary" onclick="addDespesa()">Adicionar</button>
</div>

<div class="card">
  <h3>Despesas</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>Anexos</h3>
  <input id="file" type="file" multiple accept="image/*">
  <div id="listaAnexos"></div>
</div>

<div class="card">
  <h3>Observações</h3>
  <textarea id="observacoes"></textarea>
</div>

<div class="card">
  <button class="btn-primary" onclick="finalizar()">Gerar PDF</button>
</div>

<script>

/* ===== CIDADES MG COMPLETAS (API IBGE) ===== */
fetch("https://servicodados.ibge.gov.br/api/v1/localidades/estados/MG/municipios")
.then(res=>res.json())
.then(data=>{
  const lista=document.getElementById("cidades-mg");
  data.forEach(c=>{
    lista.innerHTML+=`<option value="${c.nome} - MG">`;
  });
});

/* ===== VARIÁVEIS ===== */
let despesas=[], anexos=[];

/* ===== PARADAS ===== */
function addParada(){
  const d=document.createElement("div");
  d.innerHTML=`<input list="cidades-mg" placeholder="Parada">`;
  paradas.appendChild(d);
}

/* ===== CATEGORIA ===== */
function controleCategoria(){
  sub.classList.add("hidden");
  qtd.classList.add("hidden");
  outros.classList.add("hidden");

  if(categoria.value==="Alimentação"){
    sub.classList.remove("hidden");
    qtd.classList.remove("hidden");
  }

  if(["Bônus de viagem","Veículo próprio"].includes(categoria.value)){
    qtd.classList.remove("hidden");
  }

  if(categoria.value==="Outros"){
    outros.classList.remove("hidden");
  }
}

/* ===== CALCULO ===== */
function calcularValor(){
  const q=Number(qtd.value)||0;

  if(categoria.value==="Alimentação"){
    const t={Almoço:10,"Café da tarde":10,Jantar:40};
    if(t[sub.value]) valor.value=t[sub.value]*q;
  }

  if(categoria.value==="Bônus de viagem") valor.value=25*q;
  if(categoria.value==="Veículo próprio") valor.value=(1.28*q).toFixed(2);
}

/* ===== DESPESAS ===== */
function addDespesa(){

  if(!categoria.value) return alert("Categoria obrigatória");

  despesas.push({
    categoria:categoria.value,
    detalhe:sub.value||outros.value||"",
    quantidade:Number(qtd.value)||1,
    valorTotal:Number(valor.value)||0
  });

  renderDespesas();
}

function renderDespesas(){
  lista.innerHTML="";
  despesas.forEach((d,i)=>{
    lista.innerHTML+=`
      <div class="despesa">
        ${d.categoria} - R$ ${d.valorTotal.toFixed(2)}
        <button onclick="editarDespesa(${i})">Editar</button>
        <button class="btn-del" onclick="removerDespesa(${i})">Excluir</button>
      </div>`;
  });
}

function editarDespesa(i){
  const d=despesas[i];

  categoria.value=d.categoria;
  controleCategoria();

  sub.value=d.detalhe;
  qtd.value=d.quantidade;
  valor.value=d.valorTotal;

  despesas.splice(i,1);
  renderDespesas();
}

function removerDespesa(i){
  despesas.splice(i,1);
  renderDespesas();
}

/* ===== ANEXOS ===== */
file.onchange=e=>{
  [...e.target.files].forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      anexos.push({img:ev.target.result});
      renderAnexos();
    };
    r.readAsDataURL(f);
  });
};

function renderAnexos(){
  listaAnexos.innerHTML="";
  anexos.forEach(a=>{
    listaAnexos.innerHTML+=`
      <div class="anexo">
        <img src="${a.img}" width="100%">
      </div>`;
  });
}

/* ===== PDF COMPLETO ===== */
function finalizar(){

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  let y=10,total=0;

  pdf.text(`Técnico: ${nome.value}`,10,y); y+=5;
  pdf.text(`Origem: ${origem.value}`,10,y); y+=5;
  pdf.text(`Destino: ${destino.value}`,10,y); y+=5;

  despesas.forEach(d=>{
    pdf.text(`${d.categoria} - R$ ${d.valorTotal.toFixed(2)}`,10,y);
    y+=5;
    total+=d.valorTotal;
  });

  pdf.text(`Total: R$ ${total.toFixed(2)}`,10,y);

  pdf.save("despesas.pdf");
}

</script>

</body>
</html>
