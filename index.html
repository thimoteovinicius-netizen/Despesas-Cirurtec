<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Despesas Cirurtec</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family:'Inter',sans-serif;
  background:#f6f8fb;
  padding:15px;
  color:#2c3e50;
}

.header{text-align:center;margin-bottom:20px;}
.header img{max-width:140px;}
.header h1{font-size:20px;margin-top:8px;}

.card{
  background:#fff;
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:0 6px 16px rgba(0,0,0,0.06);
  border:1px solid #eef1f5;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #e0e4ea;
  background:#fafbfc;
}

input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:#1976d2;
  background:#fff;
  box-shadow:0 0 0 2px rgba(25,118,210,0.1);
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  font-weight:500;
}

.btn-primary{background:#1976d2;color:#fff;}
.btn-sec{background:#e3f2fd;color:#1976d2;}
.btn-del{background:#fdecea;color:#c62828;}

.despesa{
  background:#f9fafb;
  border-radius:12px;
  padding:10px;
  margin-top:10px;
  border:1px solid #eef1f5;
}

.anexo{
  background:#f9fafb;
  border-radius:12px;
  padding:10px;
  margin-top:10px;
  border:1px solid #e0e0e0;
}
.anexo img{border-radius:10px;}

.hidden{display:none;}

</style>
</head>

<body>

<div class="header">
  <img src="1000644584.png">
  <h1>Despesas Cirurtec</h1>
</div>

<datalist id="cidades-mg">
  <option value="Belo Horizonte - MG">
  <option value="Uberlândia - MG">
</datalist>

<div class="card">
  <input id="nome" placeholder="Nome do técnico">
  <input id="email" placeholder="E-mail">
</div>

<div class="card">
  <label>Data início</label>
  <input type="datetime-local" id="dataInicio">
  <label>Data final</label>
  <input type="datetime-local" id="dataFim">
  <input type="number" id="adiantamento" placeholder="Adiantamento">
</div>

<div class="card">
  <h3>Trajeto</h3>
  <input id="origem" placeholder="Origem">
  <button class="btn-sec" onclick="addParada()">+ Parada</button>
  <div id="paradas"></div>
  <input id="destino" placeholder="Destino">
</div>

<div class="card">
  <h3>Nova despesa</h3>

  <select id="categoria" onchange="controleCategoria()">
    <option value="">Categoria</option>
    <option>Alimentação</option>
    <option>Bônus de viagem</option>
    <option>Veículo próprio</option>
    <option>Combustível</option>
    <option>Pedágios</option>
    <option>Peças</option>
    <option>Hospedagem</option>
    <option>Outros</option>
  </select>

  <select id="sub" class="hidden" onchange="calcularValor()">
    <option value="">Refeição</option>
    <option>Almoço</option>
    <option>Café da tarde</option>
    <option>Jantar</option>
  </select>

  <input type="number" id="qtd" class="hidden" min="1" placeholder="Quantidade" oninput="calcularValor()">
  <input id="outros" class="hidden" placeholder="Descrição">
  <input id="valor" type="number" placeholder="Valor" readonly>

  <button class="btn-primary" onclick="addDespesa()">Adicionar</button>
</div>

<div class="card">
  <h3>Despesas</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>Resumo de gastos</h3>
  <canvas id="grafico"></canvas>
</div>

<div class="card">
  <h3>Anexos</h3>
  <button class="btn-sec" onclick="camera.click()">📸 Câmera</button>
  <input id="camera" type="file" accept="image/*" capture="environment" multiple hidden>

  <button class="btn-sec" onclick="galeria.click()">🖼️ Galeria</button>
  <input id="galeria" type="file" accept="image/*" multiple hidden>

  <div id="listaAnexos"></div>
</div>

<div class="card">
  <h3>Observações</h3>
  <textarea id="observacoes"></textarea>
</div>

<div class="card">
  <button class="btn-primary" onclick="finalizar()">Gerar PDF</button>
</div>

<script>

/* ===== AUTO SAVE ===== */
function salvarDados(){
  localStorage.setItem("dados",JSON.stringify({
    nome:nome.value,email:email.value,dataInicio:dataInicio.value,dataFim:dataFim.value,
    adiantamento:adiantamento.value,origem:origem.value,destino:destino.value,
    despesas,anexos,observacoes:observacoes.value
  }));
}

function carregarDados(){
  const d=JSON.parse(localStorage.getItem("dados"));
  if(!d) return;

  nome.value=d.nome||""; email.value=d.email||"";
  dataInicio.value=d.dataInicio||""; dataFim.value=d.dataFim||"";
  adiantamento.value=d.adiantamento||"";
  origem.value=d.origem||""; destino.value=d.destino||"";
  despesas=d.despesas||[]; anexos=d.anexos||[];
  observacoes.value=d.observacoes||"";

  renderDespesas();
  renderAnexos();
  atualizarGrafico();
}

setInterval(salvarDados,3000);
window.onload=carregarDados;

/* ===== LÓGICA ORIGINAL ===== */
let despesas=[], anexos=[];

function addParada(){
  const d=document.createElement("div");
  d.innerHTML=`<input placeholder="Parada">`;
  paradas.appendChild(d);
}

function controleCategoria(){
  sub.classList.add("hidden");
  qtd.classList.add("hidden");
  outros.classList.add("hidden");
  valor.value="";
  valor.readOnly=true;

  if(categoria.value==="Alimentação"){
    sub.classList.remove("hidden");
    qtd.classList.remove("hidden");
  }

  if(["Bônus de viagem","Veículo próprio"].includes(categoria.value)){
    qtd.classList.remove("hidden");
    calcularValor();
  }

  if(categoria.value==="Outros"){
    outros.classList.remove("hidden");
    valor.readOnly=false;
  }

  if(["Combustível","Pedágios","Peças","Hospedagem"].includes(categoria.value)){
    valor.readOnly=false;
  }
}

function calcularValor(){
  const q=Number(qtd.value)||0;

  if(categoria.value==="Alimentação"){
    const t={Almoço:10,"Café da tarde":10,Jantar:40};
    if(t[sub.value]&&q) valor.value=t[sub.value]*q;
  }

  if(categoria.value==="Bônus de viagem"&&q) valor.value=25*q;
  if(categoria.value==="Veículo próprio"&&q) valor.value=(1.28*q).toFixed(2);
}

function addDespesa(){
  if(!categoria.value||!valor.value) return alert("Preencha os dados");

  despesas.push({
    categoria:categoria.value,
    detalhe:sub.value||outros.value||"",
    quantidade:Number(qtd.value)||1,
    valorTotal:Number(valor.value)
  });

  renderDespesas();
  atualizarGrafico();
}

function renderDespesas(){
  lista.innerHTML="";
  despesas.forEach((d,i)=>{
    lista.innerHTML+=`
      <div class="despesa">
        ${d.categoria} - R$ ${d.valorTotal.toFixed(2)}
        <button class="btn-sec" onclick="removerDespesa(${i})">Remover</button>
      </div>`;
  });
}

function removerDespesa(i){
  despesas.splice(i,1);
  renderDespesas();
  atualizarGrafico();
}

/* ===== GRÁFICO ===== */
let grafico;

function atualizarGrafico(){
  const resumo={};
  despesas.forEach(d=>{
    if(!resumo[d.categoria]) resumo[d.categoria]=0;
    resumo[d.categoria]+=d.valorTotal;
  });

  if(grafico) grafico.destroy();

  grafico=new Chart(grafico=document.getElementById("grafico"),{
    type:"doughnut",
    data:{labels:Object.keys(resumo),datasets:[{data:Object.values(resumo)}]},
    options:{plugins:{legend:{position:"bottom"}}}
  });
}

/* ===== ANEXOS ===== */
function processarArquivos(input){
  [...input.files].forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      anexos.push({img:e.target.result,desc:""});
      renderAnexos();
    };
    r.readAsDataURL(f);
  });
}

camera.onchange=()=>processarArquivos(camera);
galeria.onchange=()=>processarArquivos(galeria);

function renderAnexos(){
  listaAnexos.innerHTML="";
  anexos.forEach(a=>{
    listaAnexos.innerHTML+=`<div class="anexo"><img src="${a.img}" width="100%"></div>`;
  });
}

/* ===== PDF ===== */
function finalizar(){

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  let y=30,total=0;

  pdf.setFillColor(25,118,210);
  pdf.rect(0,0,210,20,"F");

  pdf.setTextColor(255,255,255);
  pdf.text("Relatório de Despesas",10,13);

  pdf.setTextColor(0,0,0);

  despesas.forEach(d=>total+=d.valorTotal);

  pdf.text(`Técnico: ${nome.value}`,10,y); y+=6;
  pdf.text(`Total: R$ ${total.toFixed(2)}`,10,y);

  pdf.save("despesas.pdf");
}

</script>

</body>
  </html>
