<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Despesas Cirurtec</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family:'Inter',sans-serif;
  background:#f6f8fb;
  padding:15px;
}

.card{
  background:#fff;
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:0 6px 16px rgba(0,0,0,0.06);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #e0e4ea;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:14px;
}

.btn-primary{background:#1976d2;color:#fff;}
.btn-sec{background:#e3f2fd;color:#1976d2;}
.btn-del{background:#fdecea;color:#c62828;}

.sugestoes{
  background:#fff;
  border-radius:12px;
  margin-top:5px;
  box-shadow:0 6px 12px rgba(0,0,0,0.08);
  max-height:200px;
  overflow:auto;
}

.item-cidade{
  padding:10px;
  cursor:pointer;
}
.item-cidade:hover{background:#f1f5f9;}

.hidden{display:none;}

</style>
</head>

<body>

<div class="card">
  <input id="nome" placeholder="Nome do técnico">
  <input id="email" placeholder="E-mail">
</div>

<div class="card">
  <input type="datetime-local" id="dataInicio">
  <input type="datetime-local" id="dataFim">
  <input type="number" id="adiantamento" placeholder="Adiantamento">
</div>

<div class="card">
  <h3>Trajeto</h3>

  <input id="origem" placeholder="Origem" oninput="buscarCidade(this)">
  <div class="sugestoes"></div>

  <button class="btn-sec" onclick="addParada()">+ Parada</button>
  <div id="paradas"></div>

  <input id="destino" placeholder="Destino" oninput="buscarCidade(this)">
  <div class="sugestoes"></div>
</div>

<div class="card">
  <h3>Nova despesa</h3>

  <select id="categoria" onchange="controleCategoria()">
    <option value="">Categoria</option>
    <option>Alimentação</option>
    <option>Bônus de viagem</option>
    <option>Veículo próprio</option>
    <option>Combustível</option>
    <option>Pedágios</option>
    <option>Peças</option>
    <option>Hospedagem</option>
    <option>Outros</option>
  </select>

  <select id="sub" class="hidden" onchange="calcularValor()">
    <option value="">Refeição</option>
    <option>Almoço</option>
    <option>Café da tarde</option>
    <option>Jantar</option>
  </select>

  <input id="qtd" class="hidden" type="number" oninput="calcularValor()">
  <input id="outros" class="hidden" placeholder="Descrição">
  <input id="valor" type="number" placeholder="Valor" readonly>

  <button class="btn-primary" onclick="addDespesa()">Adicionar</button>
</div>

<div class="card">
  <h3>Despesas</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>Resumo</h3>
  <canvas id="grafico"></canvas>
</div>

<div class="card">
  <button class="btn-primary" onclick="finalizar()">Gerar PDF</button>
</div>

<script>

/* ===== CIDADES ===== */
const cidadesMG = [
"Belo Horizonte","Uberlândia","Contagem","Betim","Juiz de Fora","Uberaba",
"Montes Claros","Ipatinga","Sete Lagoas","Divinópolis","Varginha","Araxá"
];

function buscarCidade(input){
  const termo=input.value.toLowerCase();
  const box=input.nextElementSibling;
  box.innerHTML="";

  if(termo.length<2) return;

  cidadesMG
  .filter(c=>c.toLowerCase().includes(termo))
  .slice(0,10)
  .forEach(c=>{
    const div=document.createElement("div");
    div.className="item-cidade";
    div.innerText=c;
    div.onclick=()=>{
      input.value=c;
      box.innerHTML="";
      salvarDados();
    };
    box.appendChild(div);
  });
}

/* ===== AUTO SAVE ===== */
let despesas=[];

function salvarDados(){
  localStorage.setItem("dados",JSON.stringify({
    nome:nome.value,email:email.value,dataInicio:dataInicio.value,
    dataFim:dataFim.value,adiantamento:adiantamento.value,
    origem:origem.value,destino:destino.value,despesas
  }));
}

function carregarDados(){
  const d=JSON.parse(localStorage.getItem("dados"));
  if(!d) return;

  nome.value=d.nome||"";
  email.value=d.email||"";
  dataInicio.value=d.dataInicio||"";
  dataFim.value=d.dataFim||"";
  adiantamento.value=d.adiantamento||"";
  origem.value=d.origem||"";
  destino.value=d.destino||"";
  despesas=d.despesas||[];

  renderDespesas();
  atualizarGrafico();
}

setInterval(salvarDados,3000);
window.onload=carregarDados;

/* ===== DESPESAS ===== */
function controleCategoria(){
  sub.classList.add("hidden");
  qtd.classList.add("hidden");
  outros.classList.add("hidden");

  if(categoria.value==="Alimentação"){
    sub.classList.remove("hidden");
    qtd.classList.remove("hidden");
  }

  if(["Bônus de viagem","Veículo próprio"].includes(categoria.value)){
    qtd.classList.remove("hidden");
  }

  if(categoria.value==="Outros"){
    outros.classList.remove("hidden");
  }
}

function calcularValor(){
  const q=Number(qtd.value)||0;

  if(categoria.value==="Alimentação"){
    const t={Almoço:10,"Café da tarde":10,Jantar:40};
    if(t[sub.value]) valor.value=t[sub.value]*q;
  }

  if(categoria.value==="Bônus de viagem") valor.value=25*q;
  if(categoria.value==="Veículo próprio") valor.value=(1.28*q).toFixed(2);
}

function addDespesa(){
  despesas.push({
    categoria:categoria.value,
    valorTotal:Number(valor.value)
  });
  renderDespesas();
  atualizarGrafico();
}

function renderDespesas(){
  lista.innerHTML="";
  despesas.forEach((d,i)=>{
    lista.innerHTML+=`
      <div class="despesa">
        ${d.categoria} - R$ ${d.valorTotal.toFixed(2)}
        <button onclick="removerDespesa(${i})">Remover</button>
      </div>`;
  });
}

function removerDespesa(i){
  despesas.splice(i,1);
  renderDespesas();
  atualizarGrafico();
}

/* ===== GRÁFICO ===== */
let grafico;

function atualizarGrafico(){
  const resumo={};
  despesas.forEach(d=>{
    if(!resumo[d.categoria]) resumo[d.categoria]=0;
    resumo[d.categoria]+=d.valorTotal;
  });

  if(grafico) grafico.destroy();

  grafico=new Chart(document.getElementById("grafico"),{
    type:"doughnut",
    data:{labels:Object.keys(resumo),datasets:[{data:Object.values(resumo)}]}
  });
}

/* ===== PARADA ===== */
function addParada(){
  const d=document.createElement("div");
  d.innerHTML=`
    <input placeholder="Parada" oninput="buscarCidade(this)">
    <div class="sugestoes"></div>
  `;
  paradas.appendChild(d);
}

/* ===== PDF COMPLETO ===== */
function finalizar(){

  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  let y=30,total=0;

  pdf.setFillColor(25,118,210);
  pdf.rect(0,0,210,20,"F");

  pdf.setTextColor(255,255,255);
  pdf.text("Relatório de Despesas",10,13);

  pdf.setTextColor(0,0,0);

  despesas.forEach(d=>total+=d.valorTotal);

  pdf.text(`Técnico: ${nome.value}`,10,y); y+=6;
  pdf.text(`Origem: ${origem.value}`,10,y); y+=6;
  pdf.text(`Destino: ${destino.value}`,10,y); y+=6;

  pdf.text("Despesas:",10,y); y+=6;

  despesas.forEach(d=>{
    pdf.text(`${d.categoria} - R$ ${d.valorTotal.toFixed(2)}`,10,y);
    y+=5;
  });

  pdf.text(`Total: R$ ${total.toFixed(2)}`,10,y);

  pdf.save("despesas.pdf");
}

</script>

</body>
</html>
